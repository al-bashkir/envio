[target.x86_64-unknown-linux-gnu]
pre-build = ["export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libgpgme11-dev libgpg-error-dev libdbus-1-dev pkg-config && mkdir -p /usr/lib/x86_64-linux-gnu/pkgconfig && if [ ! -f /usr/lib/x86_64-linux-gnu/pkgconfig/gpg-error.pc ]; then printf '%s\n' 'prefix=/usr' 'exec_prefix=${prefix}' 'libdir=${exec_prefix}/lib/x86_64-linux-gnu' 'includedir=${prefix}/include/x86_64-linux-gnu' '' 'Name: gpg-error' 'Description: GnuPG error library' 'Version: 1.21' 'Libs: -L${libdir} -lgpg-error' 'Cflags: -I${includedir}' > /usr/lib/x86_64-linux-gnu/pkgconfig/gpg-error.pc; fi && if [ ! -f /usr/lib/x86_64-linux-gnu/pkgconfig/gpgme.pc ]; then printf '%s\n' 'prefix=/usr' 'exec_prefix=${prefix}' 'libdir=${exec_prefix}/lib/x86_64-linux-gnu' 'includedir=${prefix}/include' '' 'Name: gpgme' 'Description: GnuPG Made Easy' 'Version: 1.6.0' 'Requires: gpg-error' 'Libs: -L${libdir} -lgpgme -lassuan -lgpg-error' 'Cflags: -I${includedir}' > /usr/lib/x86_64-linux-gnu/pkgconfig/gpgme.pc; fi"]

[target.aarch64-unknown-linux-gnu]
pre-build = ["dpkg --add-architecture arm64 && export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libgpgme11-dev:arm64 libgpg-error-dev:arm64 libdbus-1-dev:arm64 pkg-config && mkdir -p /usr/lib/aarch64-linux-gnu/pkgconfig && if [ ! -f /usr/lib/aarch64-linux-gnu/pkgconfig/gpg-error.pc ]; then printf '%s\n' 'prefix=/usr' 'exec_prefix=${prefix}' 'libdir=${exec_prefix}/lib/aarch64-linux-gnu' 'includedir=${prefix}/include/aarch64-linux-gnu' '' 'Name: gpg-error' 'Description: GnuPG error library' 'Version: 1.21' 'Libs: -L${libdir} -lgpg-error' 'Cflags: -I${includedir}' > /usr/lib/aarch64-linux-gnu/pkgconfig/gpg-error.pc; fi && if [ ! -f /usr/lib/aarch64-linux-gnu/pkgconfig/gpgme.pc ]; then printf '%s\n' 'prefix=/usr' 'exec_prefix=${prefix}' 'libdir=${exec_prefix}/lib/aarch64-linux-gnu' 'includedir=${prefix}/include' '' 'Name: gpgme' 'Description: GnuPG Made Easy' 'Version: 1.6.0' 'Requires: gpg-error' 'Libs: -L${libdir} -lgpgme -lassuan -lgpg-error' 'Cflags: -I${includedir}' > /usr/lib/aarch64-linux-gnu/pkgconfig/gpgme.pc; fi"]
