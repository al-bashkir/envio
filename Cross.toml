[target.x86_64-unknown-linux-gnu]
pre-build = ["export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libgpgme11-dev libgpg-error-dev libdbus-1-dev pkg-config && for pc in gpg-error gpgme; do if [ ! -f /usr/lib/x86_64-linux-gnu/pkgconfig/${pc}.pc ]; then for candidate in /usr/lib/pkgconfig/${pc}.pc /usr/share/pkgconfig/${pc}.pc; do if [ -f ${candidate} ]; then mkdir -p /usr/lib/x86_64-linux-gnu/pkgconfig && ln -sf ${candidate} /usr/lib/x86_64-linux-gnu/pkgconfig/${pc}.pc && break; fi; done; fi; done"]

[target.aarch64-unknown-linux-gnu]
pre-build = ["dpkg --add-architecture arm64 && export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libgpgme11-dev:arm64 libgpg-error-dev:arm64 libdbus-1-dev:arm64 pkg-config && for pc in gpg-error gpgme; do if [ ! -f /usr/lib/aarch64-linux-gnu/pkgconfig/${pc}.pc ]; then for candidate in /usr/lib/pkgconfig/${pc}.pc /usr/share/pkgconfig/${pc}.pc /usr/aarch64-linux-gnu/lib/pkgconfig/${pc}.pc; do if [ -f ${candidate} ]; then mkdir -p /usr/lib/aarch64-linux-gnu/pkgconfig && ln -sf ${candidate} /usr/lib/aarch64-linux-gnu/pkgconfig/${pc}.pc && break; fi; done; fi; done"]
